name: Test and Deploy to Server

on:
  push:
    branches: [production, staging]
  pull_request:
    branches: [production, staging]

env:
  SSH_HOST: ${{ secrets.HOST }}
  SSH_USERNAME: ${{ secrets.USERNAME }}
  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_PASSPHRASE: ${{ secrets.PASSPHRASE }}
  SSH_PORT: 22

jobs:
  test:
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify test toolchain versions
        run: |
          npx jest --version
          node -e "const p=require('./node_modules/ts-jest/package.json'); console.log('ts-jest', p.version)"

      - name: Set up environment variables
        run: |
          echo "NODE_ENV=test" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          echo "MAIN_API_MONGO_DB_STRING=mongodb://localhost:27017/habeep-test" >> $GITHUB_ENV
          echo "MAIN_API_ENCRYPTION_KEY=test-encryption-key-for-ci" >> $GITHUB_ENV
          echo "MAIN_API_JWT_ENCRYPTION_KEY=test-jwt-key-for-ci" >> $GITHUB_ENV
          echo "MAIN_API_GEMINI_API_KEY=test-gemini-key-for-ci" >> $GITHUB_ENV
          echo "APP_VERSION=v2" >> $GITHUB_ENV

      - name: Wait for MongoDB
        run: |
          echo "Waiting for MongoDB to be ready..."
          timeout 60 bash -c 'until nc -z localhost 27017; do echo "Waiting for MongoDB..."; sleep 2; done'
          echo "MongoDB is ready!"

      - name: Check environment variables
        run: pnpm run check-env

      - name: Run unit tests
        run: pnpm test

      - name: Run linting
        run: pnpm run lint

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          command_timeout: 5m
          script: |
            set -e
            echo "=== Starting Staging Deployment ==="

            cd v2/staging/backend-monorepo/scripts
            if [ -f update-process.sh ]; then
              echo "Running update script..."
              bash update-process.sh
              echo "=== Staging Deployment Completed Successfully ==="
            else
              echo "ERROR: update-process.sh not found"
              exit 1
            fi

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          command_timeout: 5m
          script: |
            set -e
            echo "=== Starting Production Deployment ==="

            cd v2/production/backend-monorepo/scripts
            if [ -f update-process.sh ]; then
              echo "Running update script..."
              bash update-process.sh
              echo "=== Production Deployment Completed Successfully ==="
            else
              echo "ERROR: update-process.sh not found"
              exit 1
            fi
